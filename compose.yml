services:
  sql:
    # Production: ghcr.io/hanzoai/sql:18 (amd64 only)
    # Local dev: postgres:18-alpine (multi-arch)
    image: ${SQL_IMAGE:-postgres:17-alpine}
    environment:
      POSTGRES_DB: paas
      POSTGRES_USER: paas
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - sqldata:/var/lib/postgresql/data
    healthcheck:
      test: [CMD, pg_isready, -U, paas]
      interval: 5s
      timeout: 3s
      retries: 5

  kv:
    # Production: ghcr.io/hanzoai/kv:8 (amd64 only)
    # Local dev: valkey/valkey:8-alpine (multi-arch)
    image: ${KV_IMAGE:-valkey/valkey:8-alpine}
    command: [valkey-server, --appendonly, "yes", --maxmemory, 256mb, --maxmemory-policy, allkeys-lru]
    ports:
      - "6379:6379"
    healthcheck:
      test: [CMD, valkey-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  sqldata:
